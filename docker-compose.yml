version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-strapi}
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-strapi}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    image: strapi-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-strapi}
      # Required Strapi Configuration (must be set in .env)
      # APP_KEYS: ${APP_KEYS}
      # API_TOKEN_SALT: ${API_TOKEN_SALT}
      # ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      # TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      # JWT_SECRET: ${JWT_SECRET}
    ports:
      - '1337:1337'
    depends_on:
      - db

  next:
    build:
      context: ./next
      dockerfile: Dockerfile
    image: next-app:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    environment:
      # Next Configuration
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://strapi:1337}
      # STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}
    depends_on:
      - strapi

volumes:
  db-data:
